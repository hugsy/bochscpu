name: Build

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - ubuntu-24.04
          - windows-11-arm
        build: [debug, release]

    name: ${{ matrix.os }}/${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - run: |
          rustup update
          rustup component add rustfmt
          rustup show

      - name: Build (debug)
        if: matrix.build == 'debug'
        run: |
          cargo fmt --check
          cargo build --all-targets
          cargo clippy

      - name: Build (release)
        if: matrix.build == 'release'
        run: |
          cargo fmt --check
          cargo build --all-targets --release
          cargo clippy --release

      - name: Run Tests (debug)
        if: matrix.build == 'debug'
        run: |
          cargo test

      - name: Run Tests (release)
        if: matrix.build == 'release'
        run: |
          cargo test --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: bochscpu_${{ matrix.build }}_${{ matrix.os }}_${{ github.sha }}
          if-no-files-found: warn
          path: |
            ./target/**/*.rlib
            ./target/**/*.exe
            ./target/**/*.pdb
            ./target/**/*.dll


